id: fix-logs
name: Fix from Logs
description: Analyze logs and fix issues
version: 1.0.0

metadata:
  category: debugging
  complexity: medium
  tags: [logs, debug, fix]

triggers:
  - pattern: 'fix logs*'
  - pattern: 'analyze logs*'

context:
  input:
    - issue: string

steps:
  - id: read-logs
    name: Read and Analyze Logs
    description: Debug from logs file
    action: |
      Use `debugger` agent to read `./logs.txt` file.
      Analyze and find root causes of issues.
      If file unavailable, reproduce issue and pipe logs to `./logs.txt`.
    workflows:
      - '{bmad_folder}/bmm/workflows/debugging/workflow.yaml'

  - id: scout
    name: Scout Codebase
    description: Find issue location
    action: |
      Use `scout` agent to analyze codebase and find exact location of issues.
    workflows:
      - '{bmad_folder}/bmm/workflows/scout/workflow.yaml'

  - id: plan
    name: Create Fix Plan
    description: Create implementation plan
    action: |
      Use `planner` agent to create implementation plan based on reports.
    workflows:
      - '{bmad_folder}/bmm/workflows/planning/workflow.yaml'

  - id: implement
    name: Implement Fix
    description: Apply the fix
    action: |
      Start implementing the fix based on reports and solutions.

  - id: test
    name: Test Fix
    description: Verify fix works
    action: |
      Use `tester` agent to test the fix.
    workflows:
      - '{bmad_folder}/bmm/workflows/testing/workflow.yaml'

  - id: review
    name: Code Review
    description: Quick review of changes
    action: |
      Use `code-reviewer` agent to quickly review code changes.
      If issues or failed tests, repeat from scout step.
    workflows:
      - '{bmad_folder}/bmm/workflows/code-review/workflow.yaml'

  - id: report
    name: Report
    description: Summarize changes
    action: |
      Report summary of changes.
      Guide user and suggest next steps.
