# Hono Code Review Workflow
# Review Hono code for best practices, performance, security, and patterns

workflow:
  metadata:
    name: Hono Code Review
    description: 'Review Hono application code for best practices, security, performance, and type safety'
    icon: 🔍
    agent: hono-expert

  inputs:
    - name: review_scope
      description: 'Scope of review (full, routing, middleware, security, performance, types)'
      required: false
      default: 'full'

    - name: target_files
      description: 'Specific files or directories to review'
      required: false
      default: 'src/'

    - name: strictness
      description: 'Review strictness level (lenient, standard, strict)'
      required: false
      default: 'standard'

  phases:
    - name: 1. Structure Review
      description: 'Review project structure and organization'
      checklist:
        - id: project-structure
          description: 'Verify modular structure with routes/, middleware/, schemas/ folders'

        - id: entry-point
          description: 'Verify entry point is correct for target runtime'

        - id: exports
          description: 'Check export patterns (default app, typed routes for RPC)'

        - id: imports
          description: 'Review import organization and circular dependency detection'

    - name: 2. Type Safety Review
      description: 'Review TypeScript usage and type safety'
      checklist:
        - id: env-types
          description: 'Verify Env type defined with Bindings and Variables'

        - id: strict-mode
          description: 'Verify TypeScript strict mode is enabled'

        - id: any-usage
          description: 'Check for inappropriate use of "any" type'

        - id: validator-types
          description: 'Verify validators export proper TypeScript types'

        - id: rpc-types
          description: 'Check if route types are exported for hono/client'

    - name: 3. Routing Review
      description: 'Review routing patterns and organization'
      checklist:
        - id: route-grouping
          description: 'Verify routes are properly grouped with app.route()'

        - id: route-naming
          description: 'Check RESTful naming conventions'

        - id: param-handling
          description: 'Verify path parameters are properly typed and validated'

        - id: route-order
          description: 'Check route registration order (specific before wildcards)'

        - id: base-path
          description: 'Verify basePath usage for API versioning'

    - name: 4. Middleware Review
      description: 'Review middleware usage and configuration'
      checklist:
        - id: middleware-order
          description: 'Verify middleware is applied in correct order (logger before routes)'

        - id: cors-config
          description: 'Check CORS is properly configured for production'

        - id: auth-coverage
          description: 'Verify authentication middleware covers protected routes'

        - id: custom-middleware
          description: 'Review custom middleware for proper async handling'

        - id: error-handling
          description: 'Verify global error handler with app.onError()'

    - name: 5. Security Review
      description: 'Review security practices'
      severity: critical
      checklist:
        - id: input-validation
          description: 'All user inputs validated with typed validators (Zod/Valibot)'

        - id: auth-implementation
          description: 'Authentication properly implemented (JWT, Bearer, etc.)'

        - id: authz-checks
          description: 'Authorization checks in place for protected resources'

        - id: secrets-handling
          description: 'Secrets not hardcoded, using environment variables'

        - id: csrf-protection
          description: 'CSRF protection enabled for form submissions'

        - id: secure-headers
          description: 'Security headers configured with secureHeaders middleware'

        - id: rate-limiting
          description: 'Rate limiting implemented for public endpoints'

        - id: error-exposure
          description: 'Error messages do not expose sensitive information'

    - name: 6. Performance Review
      description: 'Review performance considerations'
      checklist:
        - id: router-preset
          description: 'Correct router preset for runtime (hono vs hono/quick vs hono/tiny)'

        - id: response-streaming
          description: 'Streaming used for large responses'

        - id: compression
          description: 'Compression enabled for production'

        - id: caching
          description: 'Appropriate caching headers and strategies'

        - id: async-patterns
          description: 'Proper async/await usage without blocking'

        - id: database-queries
          description: 'Database queries optimized (indexes, pagination)'

    - name: 7. Error Handling Review
      description: 'Review error handling patterns'
      checklist:
        - id: global-error-handler
          description: 'app.onError() configured with proper logging'

        - id: not-found-handler
          description: 'app.notFound() returns consistent 404 response'

        - id: validation-errors
          description: 'Validation errors return structured error responses'

        - id: http-status-codes
          description: 'Correct HTTP status codes used (400, 401, 403, 404, 500)'

        - id: error-logging
          description: 'Errors logged with appropriate context'

  review_criteria:
    critical_issues:
      description: 'Must fix before merge/deploy'
      examples:
        - 'Missing input validation on user data'
        - 'Hardcoded secrets or API keys'
        - 'No authentication on protected routes'
        - 'SQL injection or XSS vulnerabilities'
        - 'Sensitive data in error messages or logs'

    major_issues:
      description: 'Should fix before merge, could be deferred with ticket'
      examples:
        - 'Using "any" type for request/response'
        - 'Missing Env type definitions'
        - 'No error handling in async operations'
        - 'Missing CORS configuration'
        - 'No rate limiting on public APIs'

    minor_issues:
      description: 'Nice to fix, documentation or style issues'
      examples:
        - 'Inconsistent naming conventions'
        - 'Missing documentation comments'
        - 'Suboptimal route organization'
        - 'Missing test coverage'
        - 'Console.log statements in production code'

    suggestions:
      description: 'Optional improvements for future iterations'
      examples:
        - 'Consider using RPC mode for type-safe clients'
        - 'Could add OpenAPI documentation'
        - 'Consider streaming for large responses'
        - 'Could add request ID middleware for tracing'

  hono_specific_checks:
    context_usage:
      good:
        - 'c.json() for JSON responses'
        - 'c.text() for plain text'
        - 'c.html() for HTML content'
        - 'c.redirect() for redirects'
        - 'c.req.valid() for validated data'
      bad:
        - 'new Response() instead of context helpers'
        - 'Manual JSON.stringify instead of c.json()'
        - 'Not using c.req.valid() after validation'

    middleware_patterns:
      good:
        - 'createMiddleware() from hono/factory'
        - 'Proper async/await with next()'
        - 'Setting context variables with c.set()'
      bad:
        - 'Forgetting to call next() in middleware'
        - 'Not awaiting next() for async operations'
        - 'Mutating request/response directly'

    type_patterns:
      good:
        - 'Defining Env type with Bindings/Variables'
        - 'Using zValidator/valibotValidator'
        - 'Exporting route types for RPC'
      bad:
        - 'Using any for context'
        - 'Ignoring validator type errors'
        - 'Not using generics on Hono constructor'

  review_templates:
    summary: |
      ## 🔍 Hono Code Review Summary

      **Reviewed**: {files_reviewed}
      **Scope**: {review_scope}
      **Date**: {date}

      ### Overview
      | Category | Status | Issues |
      |----------|--------|--------|
      | Structure | {structure_status} | {structure_issues} |
      | Type Safety | {types_status} | {types_issues} |
      | Routing | {routing_status} | {routing_issues} |
      | Middleware | {middleware_status} | {middleware_issues} |
      | Security | {security_status} | {security_issues} |
      | Performance | {performance_status} | {performance_issues} |
      | Error Handling | {errors_status} | {errors_issues} |

      ### Critical Issues 🚨
      {critical_issues}

      ### Major Issues ⚠️
      {major_issues}

      ### Minor Issues 💡
      {minor_issues}

      ### Suggestions 💭
      {suggestions}

    issue_format: |
      #### {severity}: {title}

      **File**: `{file}:{line}`
      **Category**: {category}

      **Current Code**:
      ```typescript
      {current_code}
      ```

      **Issue**: {description}

      **Recommended Fix**:
      ```typescript
      {recommended_code}
      ```

      **Why**: {explanation}

  common_issues:
    missing_env_type:
      title: 'Missing Env Type Definition'
      severity: major
      description: 'Hono app created without Env type'
      current: |
        const app = new Hono()
      recommended: |
        type Env = {
          Bindings: {
            DATABASE_URL: string
          }
          Variables: {
            user: User
          }
        }
        const app = new Hono<Env>()

    missing_validation:
      title: 'User Input Not Validated'
      severity: critical
      description: 'Request body accessed without validation'
      current: |
        app.post('/users', async (c) => {
          const body = await c.req.json()
          // Using body directly...
        })
      recommended: |
        import { zValidator } from '@hono/zod-validator'

        app.post('/users',
          zValidator('json', createUserSchema),
          async (c) => {
            const body = c.req.valid('json') // Typed and validated
          }
        )

    missing_error_handler:
      title: 'No Global Error Handler'
      severity: major
      description: 'App missing global error handler'
      current: |
        const app = new Hono()
        // No error handling...
      recommended: |
        const app = new Hono()

        app.onError((err, c) => {
          console.error(`Error: ${err.message}`)
          return c.json({
            error: 'Internal Server Error',
            message: process.env.NODE_ENV === 'development' ? err.message : undefined
          }, 500)
        })

        app.notFound((c) => {
          return c.json({ error: 'Not Found' }, 404)
        })

    cors_not_configured:
      title: 'CORS Not Configured'
      severity: major
      description: 'API routes missing CORS middleware'
      current: |
        app.get('/api/data', (c) => c.json({ data: [] }))
      recommended: |
        import { cors } from 'hono/cors'

        app.use('/api/*', cors({
          origin: ['https://myapp.com'],
          allowMethods: ['GET', 'POST', 'PUT', 'DELETE'],
          credentials: true
        }))

    hardcoded_secrets:
      title: 'Hardcoded Secrets'
      severity: critical
      description: 'Secrets hardcoded in source code'
      current: |
        const jwtSecret = 'my-super-secret-key'
        app.use('/api/*', jwt({ secret: jwtSecret }))
      recommended: |
        // Use environment variables via bindings
        type Env = {
          Bindings: { JWT_SECRET: string }
        }
        const app = new Hono<Env>()

        app.use('/api/*', (c, next) => {
          return jwt({ secret: c.env.JWT_SECRET })(c, next)
        })

  output:
    description: 'Comprehensive Hono code review report'
    deliverables:
      - 'Review summary with issue counts by category'
      - 'Detailed findings with severity levels'
      - 'Specific code recommendations with examples'
      - 'Action items prioritized by severity'
