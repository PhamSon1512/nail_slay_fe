# Hono Create Middleware Workflow
# Create custom middleware for Hono applications

workflow:
  metadata:
    name: Create Hono Middleware
    description: 'Create custom middleware with proper typing and patterns'
    icon: 🔧
    agent: hono-expert

  inputs:
    - name: middleware_name
      description: 'Name of the middleware (e.g., auth, rateLimit, cache)'
      required: true

    - name: middleware_type
      description: 'Type of middleware (before, after, wrap)'
      required: false
      default: 'before'

    - name: with_options
      description: 'Create middleware factory with configuration options'
      required: false
      default: true

  phases:
    - name: 1. Middleware Design
      description: 'Design the middleware interface'
      checklist:
        - id: define-purpose
          description: 'Clearly define what the middleware does'

        - id: define-options
          description: 'Define configuration options interface'

        - id: define-context-vars
          description: 'Define Variables to set in context (if any)'

        - id: define-dependencies
          description: 'List external dependencies needed'

    - name: 2. Implementation
      description: 'Implement the middleware'
      checklist:
        - id: create-types
          description: 'Create TypeScript interfaces for options and context'

        - id: implement-factory
          description: 'Implement middleware factory function'

        - id: implement-logic
          description: 'Implement core middleware logic'

        - id: handle-errors
          description: 'Implement error handling within middleware'

    - name: 3. Testing
      description: 'Test the middleware'
      checklist:
        - id: unit-tests
          description: 'Write unit tests for middleware logic'

        - id: integration-tests
          description: 'Test middleware in context with routes'

        - id: edge-cases
          description: 'Test error handling and edge cases'

  patterns:
    before_handler: |
      // Middleware that runs BEFORE the handler
      // Use case: authentication, validation, rate limiting

      import { createMiddleware } from 'hono/factory'
      import type { Context, Next } from 'hono'

      type {MiddlewareName}Options = {
        // Define your options here
        enabled?: boolean
      }

      export const {middlewareName} = (options: {MiddlewareName}Options = {}) => {
        const { enabled = true } = options

        return createMiddleware(async (c: Context, next: Next) => {
          if (!enabled) {
            await next()
            return
          }

          // Do something BEFORE handler
          console.log('Before handler:', c.req.path)

          // Optionally set variables for handler access
          // c.set('myVar', someValue)

          // Call next to proceed to handler
          await next()
        })
      }

    after_handler: |
      // Middleware that runs AFTER the handler
      // Use case: response modification, logging, caching

      import { createMiddleware } from 'hono/factory'
      import type { Context, Next } from 'hono'

      type {MiddlewareName}Options = {
        enabled?: boolean
      }

      export const {middlewareName} = (options: {MiddlewareName}Options = {}) => {
        const { enabled = true } = options

        return createMiddleware(async (c: Context, next: Next) => {
          // Call next first to let handler run
          await next()

          if (!enabled) return

          // Do something AFTER handler
          // Modify response headers, log response, etc.
          c.res.headers.set('X-Custom-Header', 'value')
        })
      }

    wrap_handler: |
      // Middleware that wraps the handler
      // Use case: timing, error handling, transaction

      import { createMiddleware } from 'hono/factory'
      import type { Context, Next } from 'hono'

      type {MiddlewareName}Options = {
        logTiming?: boolean
      }

      export const {middlewareName} = (options: {MiddlewareName}Options = {}) => {
        const { logTiming = true } = options

        return createMiddleware(async (c: Context, next: Next) => {
          const start = Date.now()

          try {
            // Before handler
            console.log('Starting:', c.req.path)

            await next()

            // After handler (success)
            if (logTiming) {
              const duration = Date.now() - start
              console.log(`Completed: ${c.req.path} in ${duration}ms`)
            }
          } catch (error) {
            // Error handling
            const duration = Date.now() - start
            console.error(`Failed: ${c.req.path} in ${duration}ms`, error)
            throw error
          }
        })
      }

    with_context_variables: |
      // Middleware that adds typed variables to context
      // Use case: user info, database connection, feature flags

      import { createMiddleware } from 'hono/factory'
      import type { Context, Next, MiddlewareHandler } from 'hono'

      // Define the variable type
      type User = {
        id: string
        email: string
        role: 'admin' | 'user'
      }

      // Define Env type for typed context
      type {MiddlewareName}Env = {
        Variables: {
          user: User
        }
      }

      type {MiddlewareName}Options = {
        // Options here
      }

      export const {middlewareName} = (
        options: {MiddlewareName}Options = {}
      ): MiddlewareHandler<{MiddlewareName}Env> => {
        return createMiddleware<{MiddlewareName}Env>(async (c, next) => {
          // Extract user from token, database, etc.
          const user: User = {
            id: '123',
            email: 'user@example.com',
            role: 'user'
          }

          // Set typed variable
          c.set('user', user)

          await next()
        })
      }

      // Usage in routes:
      // const user = c.get('user') // Typed as User

  common_middleware_examples:
    rate_limiter: |
      import { createMiddleware } from 'hono/factory'

      type RateLimitOptions = {
        windowMs: number
        max: number
        keyGenerator?: (c: Context) => string
      }

      const store = new Map<string, { count: number; resetTime: number }>()

      export const rateLimit = (options: RateLimitOptions) => {
        const { windowMs = 60000, max = 100, keyGenerator } = options

        return createMiddleware(async (c, next) => {
          const key = keyGenerator?.(c) ?? c.req.header('CF-Connecting-IP') ?? 'unknown'
          const now = Date.now()

          let record = store.get(key)

          if (!record || now > record.resetTime) {
            record = { count: 0, resetTime: now + windowMs }
          }

          record.count++
          store.set(key, record)

          // Set rate limit headers
          c.header('X-RateLimit-Limit', String(max))
          c.header('X-RateLimit-Remaining', String(Math.max(0, max - record.count)))
          c.header('X-RateLimit-Reset', String(record.resetTime))

          if (record.count > max) {
            return c.json({ error: 'Too many requests' }, 429)
          }

          await next()
        })
      }

    request_id: |
      import { createMiddleware } from 'hono/factory'

      export const requestId = () => {
        return createMiddleware(async (c, next) => {
          const id = c.req.header('X-Request-ID') ?? crypto.randomUUID()
          c.set('requestId', id)
          c.header('X-Request-ID', id)
          await next()
        })
      }

    timing: |
      import { createMiddleware } from 'hono/factory'

      export const timing = () => {
        return createMiddleware(async (c, next) => {
          const start = performance.now()
          await next()
          const duration = performance.now() - start
          c.header('X-Response-Time', `${duration.toFixed(2)}ms`)
        })
      }

  output:
    description: 'Custom middleware ready for use'
    files:
      - 'src/middleware/{middlewareName}.ts - Middleware implementation'
      - 'src/middleware/{middlewareName}.test.ts - Unit tests'
    usage: |
      // Import and use:
      import { {middlewareName} } from './middleware/{middlewareName}'

      app.use('*', {middlewareName}({ /* options */ }))
