# Hono Create API Workflow
# Create REST API endpoints with validation and documentation

workflow:
  metadata:
    name: Create Hono API
    description: 'Create REST API endpoints with validation, typing, and documentation'
    icon: 🌐
    agent: hono-expert

  inputs:
    - name: resource_name
      description: 'Name of the resource (e.g., users, posts, products)'
      required: true

    - name: operations
      description: 'CRUD operations to create (list, get, create, update, delete)'
      required: false
      default: 'list,get,create,update,delete'

    - name: validator
      description: 'Validation library (zod, valibot, none)'
      required: false
      default: 'zod'

    - name: generate_types
      description: 'Generate TypeScript types from schema'
      required: false
      default: true

  phases:
    - name: 1. Schema Definition
      description: 'Define resource schema and validation rules'
      checklist:
        - id: define-base-schema
          description: 'Create base schema for the resource'

        - id: define-create-schema
          description: 'Create schema for create operation (without id, timestamps)'

        - id: define-update-schema
          description: 'Create partial schema for update operation'

        - id: define-query-schema
          description: 'Create schema for query parameters (pagination, filters)'

        - id: export-types
          description: 'Export TypeScript types from schemas'

    - name: 2. Route Implementation
      description: 'Create route handlers with validation'
      checklist:
        - id: create-router-file
          description: 'Create routes/{resource}.ts file'

        - id: implement-list
          description: 'Implement GET /{resources} with pagination'

        - id: implement-get
          description: 'Implement GET /{resources}/:id'

        - id: implement-create
          description: 'Implement POST /{resources} with body validation'

        - id: implement-update
          description: 'Implement PUT/PATCH /{resources}/:id'

        - id: implement-delete
          description: 'Implement DELETE /{resources}/:id'

    - name: 3. Error Handling
      description: 'Implement proper error responses'
      checklist:
        - id: validation-errors
          description: 'Return 400 with field-level errors for validation failures'

        - id: not-found-errors
          description: 'Return 404 when resource not found'

        - id: conflict-errors
          description: 'Return 409 for duplicate/conflict errors'

        - id: server-errors
          description: 'Handle unexpected errors gracefully'

    - name: 4. Type Safety
      description: 'Ensure end-to-end type safety'
      checklist:
        - id: typed-route
          description: 'Export typed route for hono/client RPC'

        - id: typed-context
          description: 'Use proper Env types in context'

        - id: typed-responses
          description: 'Ensure response types are inferred correctly'

  templates:
    schema_zod: |
      import { z } from 'zod'

      // Base schema with all fields
      export const {resource}Schema = z.object({
        id: z.string().uuid(),
        // Add your fields here
        name: z.string().min(1, 'Name is required'),
        createdAt: z.string().datetime(),
        updatedAt: z.string().datetime()
      })

      // Schema for creating (without auto-generated fields)
      export const create{Resource}Schema = {resource}Schema.omit({
        id: true,
        createdAt: true,
        updatedAt: true
      })

      // Schema for updating (all fields optional)
      export const update{Resource}Schema = create{Resource}Schema.partial()

      // Schema for query parameters
      export const {resource}QuerySchema = z.object({
        page: z.coerce.number().min(1).default(1),
        limit: z.coerce.number().min(1).max(100).default(20),
        sort: z.enum(['createdAt', 'updatedAt', 'name']).default('createdAt'),
        order: z.enum(['asc', 'desc']).default('desc')
      })

      // Export types
      export type {Resource} = z.infer<typeof {resource}Schema>
      export type Create{Resource}Input = z.infer<typeof create{Resource}Schema>
      export type Update{Resource}Input = z.infer<typeof update{Resource}Schema>
      export type {Resource}Query = z.infer<typeof {resource}QuerySchema>

    route_handler: |
      import { Hono } from 'hono'
      import { zValidator } from '@hono/zod-validator'
      import {
        {resource}Schema,
        create{Resource}Schema,
        update{Resource}Schema,
        {resource}QuerySchema,
        type {Resource}
      } from '../schemas/{resource}'

      const {resources} = new Hono()

      // Custom error response for validation
      const validationHook = (result: any, c: any) => {
        if (!result.success) {
          return c.json({
            error: 'Validation failed',
            issues: result.error.issues.map((i: any) => ({
              field: i.path.join('.'),
              message: i.message
            }))
          }, 400)
        }
      }

      // GET /{resources} - List with pagination
      {resources}.get('/',
        zValidator('query', {resource}QuerySchema, validationHook),
        async (c) => {
          const { page, limit, sort, order } = c.req.valid('query')

          // TODO: Fetch from database
          const items: {Resource}[] = []
          const total = 0

          return c.json({
            data: items,
            pagination: {
              page,
              limit,
              total,
              totalPages: Math.ceil(total / limit)
            }
          })
        }
      )

      // GET /{resources}/:id - Get single item
      {resources}.get('/:id', async (c) => {
        const id = c.req.param('id')

        // TODO: Fetch from database
        const item = null

        if (!item) {
          return c.json({ error: '{Resource} not found' }, 404)
        }

        return c.json({ data: item })
      })

      // POST /{resources} - Create new item
      {resources}.post('/',
        zValidator('json', create{Resource}Schema, validationHook),
        async (c) => {
          const input = c.req.valid('json')

          // TODO: Save to database
          const newItem: {Resource} = {
            id: crypto.randomUUID(),
            ...input,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          }

          return c.json({ data: newItem }, 201)
        }
      )

      // PUT /{resources}/:id - Update item
      {resources}.put('/:id',
        zValidator('json', update{Resource}Schema, validationHook),
        async (c) => {
          const id = c.req.param('id')
          const input = c.req.valid('json')

          // TODO: Check if exists
          const exists = false
          if (!exists) {
            return c.json({ error: '{Resource} not found' }, 404)
          }

          // TODO: Update in database
          const updated: {Resource} = {
            id,
            ...input,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          } as {Resource}

          return c.json({ data: updated })
        }
      )

      // DELETE /{resources}/:id - Delete item
      {resources}.delete('/:id', async (c) => {
        const id = c.req.param('id')

        // TODO: Check if exists
        const exists = false
        if (!exists) {
          return c.json({ error: '{Resource} not found' }, 404)
        }

        // TODO: Delete from database

        return c.json({ message: '{Resource} deleted successfully' })
      })

      // Export for RPC typing
      export default {resources}

  output:
    description: 'Type-safe CRUD API for the resource'
    files:
      - 'src/schemas/{resource}.ts - Zod schemas and types'
      - 'src/routes/{resource}.ts - Route handlers'
    usage: |
      // In your main app:
      import {resources} from './routes/{resource}'
      app.route('/{resources}', {resources})
