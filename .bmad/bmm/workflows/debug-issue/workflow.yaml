name: debug-issue
description: 'Systematic debugging workflow ensuring root cause investigation before fixes. Four-phase process with backward call stack tracing, multi-layer validation, and verification protocols.'
author: 'BMad'
version: '3.0.0'

# Critical variables from config
config_source: '{project-root}/{bmad_folder}/bmm/config.yaml'
output_folder: '{config_source}:output_folder'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
user_skill_level: '{config_source}:user_skill_level'
document_output_language: '{config_source}:document_output_language'
date: system-generated

# Workflow components
installed_path: '{project-root}/{bmad_folder}/bmm/workflows/debug-issue'
instructions: '{installed_path}/instructions.md'
validation: '{installed_path}/checklist.md'

# Steps
steps_path: '{installed_path}/steps'
step_definitions:
  - id: phase-1
    name: 'Root Cause Investigation'
    file: '{steps_path}/phase-1-root-cause-investigation.md'
  - id: phase-2
    name: 'Pattern Analysis'
    file: '{steps_path}/phase-2-pattern-analysis.md'
  - id: phase-3
    name: 'Hypothesis and Testing'
    file: '{steps_path}/phase-3-hypothesis-testing.md'
  - id: phase-4
    name: 'Implementation'
    file: '{steps_path}/phase-4-implementation.md'

# Scripts
scripts_path: '{installed_path}/scripts'

# Iron Law
iron_law: 'NO FIXES WITHOUT ROOT CAUSE INVESTIGATION FIRST'

# When to use
use_cases:
  always_use:
    - 'Test failures'
    - 'Bugs and unexpected behavior'
    - 'Performance issues'
    - 'Build failures'
    - 'Integration problems'
    - 'Before claiming work complete'
  especially_when:
    - 'Under time pressure'
    - 'Quick fix seems obvious'
    - 'Tried multiple fixes already'
    - "Don't fully understand the issue"
    - 'About to claim success'

# Red flags - STOP and follow process
red_flags:
  - 'Quick fix for now, investigate later'
  - 'Just try changing X and see if it works'
  - 'Add multiple changes, run tests'
  - "Skip the test, I'll manually verify"
  - "It's probably X, let me fix that"
  - "I don't fully understand but this might work"
  - 'One more fix attempt (when already tried 2+)'

standalone: true
web_bundle: false
