name: database-ops
description: 'Unified guide for working with MongoDB and PostgreSQL databases. Schema design, queries, migrations, performance optimization, and administration.'
author: 'BMad'
version: '1.0.0'

# Critical variables from config
config_source: '{project-root}/{bmad_folder}/bmm/config.yaml'
output_folder: '{config_source}:output_folder'
date: system-generated

# Workflow components
installed_path: '{project-root}/{bmad_folder}/bmm/workflows/database-ops'
instructions: '{installed_path}/instructions.md'
validation: '{installed_path}/checklist.md'

# References
references_path: '{installed_path}/references'
references:
  mongodb:
    - id: mongodb-crud
      file: '{references_path}/mongodb-crud.md'
      description: 'CRUD operations, query operators, atomic updates'
    - id: mongodb-aggregation
      file: '{references_path}/mongodb-aggregation.md'
      description: 'Aggregation pipeline, stages, operators, patterns'
    - id: mongodb-indexing
      file: '{references_path}/mongodb-indexing.md'
      description: 'Index types, compound indexes, performance optimization'
    - id: mongodb-atlas
      file: '{references_path}/mongodb-atlas.md'
      description: 'Atlas cloud setup, clusters, monitoring, search'
  postgresql:
    - id: postgresql-queries
      file: '{references_path}/postgresql-queries.md'
      description: 'SELECT, JOINs, subqueries, CTEs, window functions'
    - id: postgresql-psql-cli
      file: '{references_path}/postgresql-psql-cli.md'
      description: 'psql commands, meta-commands, scripting'
    - id: postgresql-performance
      file: '{references_path}/postgresql-performance.md'
      description: 'EXPLAIN, query optimization, vacuum, indexes'
    - id: postgresql-administration
      file: '{references_path}/postgresql-administration.md'
      description: 'User management, backups, replication, maintenance'

# Scripts
scripts_path: '{installed_path}/scripts'
scripts:
  - id: db-migrate
    file: '{scripts_path}/db_migrate.py'
    description: 'Generate and apply migrations for both databases'
    usage: 'python db_migrate.py --db mongodb|postgres --generate <name>'
  - id: db-backup
    file: '{scripts_path}/db_backup.py'
    description: 'Backup and restore MongoDB and PostgreSQL'
    usage: 'python db_backup.py --db postgres --output /backups/'
  - id: db-performance-check
    file: '{scripts_path}/db_performance_check.py'
    description: 'Analyze slow queries and recommend indexes'
    usage: 'python db_performance_check.py --db mongodb --threshold 100ms'

# Database selection guide
database_selection:
  choose_mongodb:
    when:
      - 'Schema flexibility: frequent structure changes, heterogeneous data'
      - 'Document-centric: natural JSON/BSON data model'
      - 'Horizontal scaling: need to shard across multiple servers'
      - 'High write throughput: IoT, logging, real-time analytics'
      - 'Nested/hierarchical data: embedded documents preferred'
      - 'Rapid prototyping: schema evolution without migrations'
    best_for:
      - 'Content management'
      - 'Catalogs'
      - 'IoT time series'
      - 'Real-time analytics'
      - 'Mobile apps'
      - 'User profiles'

  choose_postgresql:
    when:
      - 'Strong consistency: ACID transactions critical'
      - 'Complex relationships: many-to-many joins, referential integrity'
      - 'SQL requirement: team expertise, reporting tools, BI systems'
      - 'Data integrity: strict schema validation, constraints'
      - 'Mature ecosystem: extensive tooling, extensions'
      - 'Complex queries: window functions, CTEs, analytical workloads'
    best_for:
      - 'Financial systems'
      - 'E-commerce transactions'
      - 'ERP, CRM'
      - 'Data warehousing'
      - 'Analytics'

  both_support:
    - 'JSON/JSONB storage and querying'
    - 'Full-text search capabilities'
    - 'Geospatial queries and indexing'
    - 'Replication and high availability'
    - 'ACID transactions (MongoDB 4.0+)'
    - 'Strong security features'

# Use cases
use_cases:
  - 'Designing database schemas and data models'
  - 'Writing queries (SQL or MongoDB query language)'
  - 'Building aggregation pipelines or complex joins'
  - 'Optimizing indexes and query performance'
  - 'Implementing database migrations'
  - 'Setting up replication, sharding, or clustering'
  - 'Configuring backups and disaster recovery'
  - 'Managing database users and permissions'
  - 'Analyzing slow queries and performance issues'
  - 'Administering production database deployments'

standalone: true
web_bundle: false
