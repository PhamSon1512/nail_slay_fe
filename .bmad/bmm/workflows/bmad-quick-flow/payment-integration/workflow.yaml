# Quick-Flow: Payment Integration
name: payment-integration
description: 'Implement payment processing with SePay (Vietnamese), Polar (global SaaS), and PayPal (global payments) - checkout flows, subscriptions, webhooks, and automated benefits.'
author: 'BMad + Quick Flow Solo Dev'
version: '1.0.0'

