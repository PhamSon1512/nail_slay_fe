  polar_products: '{installed_path}/references/polar/products.md'
  polar_checkouts: '{installed_path}/references/polar/checkouts.md'
  polar_subscriptions: '{installed_path}/references/polar/subscriptions.md'
  polar_webhooks: '{installed_path}/references/polar/webhooks.md'
  polar_benefits: '{installed_path}/references/polar/benefits.md'
  polar_sdk: '{installed_path}/references/polar/sdk.md'
  polar_best_practices: '{installed_path}/references/polar/best-practices.md'
  
  # PayPal Integration Guides
  paypal_overview: '{installed_path}/references/paypal/overview.md'
  paypal_api: '{installed_path}/references/paypal/api.md'
  paypal_subscriptions: '{installed_path}/references/paypal/subscriptions.md'
  paypal_webhooks: '{installed_path}/references/paypal/webhooks.md'
