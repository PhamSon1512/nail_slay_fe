  sepay_overview: '{installed_path}/references/sepay/overview.md'
  sepay_api: '{installed_path}/references/sepay/api.md'
  sepay_webhooks: '{installed_path}/references/sepay/webhooks.md'
  sepay_sdk: '{installed_path}/references/sepay/sdk.md'
  sepay_qr: '{installed_path}/references/sepay/qr-codes.md'
  sepay_best_practices: '{installed_path}/references/sepay/best-practices.md'
  
