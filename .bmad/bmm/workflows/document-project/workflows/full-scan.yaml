# Full Project Scan Workflow Configuration
name: 'document-project-full-scan'
description: 'Complete project documentation workflow (initial scan or full rescan)'
author: 'BMad'

# This is a sub-workflow called by document-project/workflow.yaml
parent_workflow: '{project-root}/{bmad_folder}/bmm/workflows/document-project/workflow.yaml'

# Critical variables inherited from parent
config_source: '{project-root}/{bmad_folder}/bmm/config.yaml'
output_folder: '{config_source}:output_folder'
user_name: '{config_source}:user_name'
date: system-generated

# Data files
documentation_requirements_csv: '{project-root}/{bmad_folder}/bmm/workflows/document-project/documentation-requirements.csv'

# Module path and component files
installed_path: '{project-root}/{bmad_folder}/bmm/workflows/document-project/workflows'
template: false # Action workflow
instructions: '{installed_path}/full-scan-instructions.md'
validation: '{project-root}/{bmad_folder}/bmm/workflows/document-project/checklist.md'

# Runtime inputs (passed from parent workflow)
workflow_mode: '' # "initial_scan" or "full_rescan"
scan_level: '' # "quick", "deep", or "exhaustive"
resume_mode: false
project_root_path: ''

# Configuration
autonomous: false # Requires user input at key decision points

# ============================================================================
# REPOMIX INTEGRATION - Enhanced Codebase Analysis
# ============================================================================
repomix:
  enabled: true

  # Command configuration
  command: 'repomix'
  output_file: '{output_folder}/repomix-output.xml'
  output_format: 'xml' # xml | markdown | plain

  # Default ignore patterns (in addition to .gitignore)
  default_ignore:
    - 'node_modules/**'
    - 'dist/**'
    - 'build/**'
    - 'coverage/**'
    - '.git/**'
    - '*.lock'
    - '*.log'
    - '.bmad/**'
    - '.claude/**'
    - '.idea/**'
    - '.agents/**'
    - 'repomix-output.*'

  # Default include patterns
  default_include:
    - 'src/**'
    - 'lib/**'
    - 'app/**'
    - 'packages/**'
    - '*.config.*'
    - 'package.json'
    - 'tsconfig.json'
    - '*.md'

  # Scan profiles matching scan_level
  profiles:
    quick:
      description: 'Fast scan - configs and key files only'
      include:
        - 'package.json'
        - 'tsconfig.json'
        - '*.config.*'
        - 'README.md'
        - 'src/index.*'
        - 'src/main.*'
        - 'src/app.*'
        - 'src/**/index.*'
      max_file_size_kb: 50

    deep:
      description: 'Comprehensive scan - critical directories'
      include:
        - 'src/**'
        - 'lib/**'
        - 'app/**'
        - 'api/**'
        - 'routes/**'
        - 'controllers/**'
        - 'services/**'
        - 'models/**'
        - 'components/**'
        - '*.config.*'
        - 'package.json'
        - '*.md'
      max_file_size_kb: 100

    exhaustive:
      description: 'Full scan - all source files'
      include:
        - '**/*.ts'
        - '**/*.tsx'
        - '**/*.js'
        - '**/*.jsx'
        - '**/*.py'
        - '**/*.go'
        - '**/*.rs'
        - '**/*.java'
        - '**/*.cs'
        - '**/*.rb'
        - '**/*.php'
        - '**/*.vue'
        - '**/*.svelte'
        - '**/*.md'
        - '**/*.json'
        - '**/*.yaml'
        - '**/*.yml'
      max_file_size_kb: 500

  # Options
  options:
    show_line_numbers: true
    remove_comments: false
    security_check: true

  # Fallback behavior if repomix is not installed
  fallback:
    enabled: true
    message: '⚠️ repomix not found. Install with: npm install -g repomix'
    action: 'prompt_user' # continue_without | abort | prompt_user

  # Post-processing
  post_process:
    parse_output: true
    cache_file: '{output_folder}/.cache/repomix-parsed.json'
    extract_sections:
      - file_tree
      - file_contents
      - statistics
