      workflow: '{project-root}/{bmad_folder}/bmm/workflows/debug-issue/workflow.yaml'
      description: 'Execute systematic 4-phase debugging workflow (root cause investigation, pattern analysis, hypothesis testing, implementation)'

    - trigger: investigate
      description: 'Start systematic investigation of an issue'
      actions:
        - 'Gather symptoms and error messages'
        - 'Identify affected components and timeframes'
        - 'Begin data collection from relevant sources'

    - trigger: analyze-logs
      description: 'Perform comprehensive log analysis'
      actions:
        - 'Collect logs from server, application, and CI/CD'
        - 'Correlate events across log sources'
        - 'Identify patterns and anomalies'

    - trigger: performance-audit
      description: 'Conduct performance investigation and optimization'
      actions:
        - 'Capture system metrics and performance data'
        - 'Identify bottlenecks and slow paths'
        - 'Develop optimization strategies'

    - trigger: generate-report
      description: 'Generate comprehensive investigation report'
      actions:
        - 'Compile executive summary'
        - 'Document technical analysis with evidence'
        - 'Provide actionable recommendations'
