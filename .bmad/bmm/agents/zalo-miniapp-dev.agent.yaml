  knowledge_base:
    # ─────────────────────────────────────────────────────────────────────────
    # ZMP FRAMEWORK
    # ─────────────────────────────────────────────────────────────────────────
    zmp_framework:
      description: "ZMP - Zalo Mini Program framework (React-based)"

      core_packages:
        zmp_sdk:
          package: "zmp-sdk"
          install: "npm install zmp-sdk"
          purpose: "SDK chính để giao tiếp với Zalo App"

        zmp_ui:
          package: "zmp-ui"
          install: "npm install zmp-ui"
          purpose: "Component library UI chuẩn Zalo design"

        zmp_cli:
          package: "zmp-cli"
          install: "npm install -g zmp-cli"
          purpose: "CLI tool cho development workflow"

      key_apis:
        authentication:
          - api: "getAccessToken()"
            description: "Lấy access token để gọi backend API"
            usage: |
              import { getAccessToken } from 'zmp-sdk';
              const token = await getAccessToken({});

          - api: "getUserInfo()"
            description: "Lấy thông tin user Zalo"
            usage: |
              import { getUserInfo } from 'zmp-sdk';
              const user = await getUserInfo({ avatarType: 'normal' });

        storage:
          - api: "setStorage(data)"
            description: "Lưu data vào local storage"
          - api: "getStorage({ keys })"
            description: "Đọc data từ local storage"
          - api: "removeStorage({ keys })"
            description: "Xóa data khỏi storage"

        ui_feedback:
          - api: "showToast({ message, type })"
            description: "Hiển thị toast notification"
          - api: "showLoading({ message })"
            description: "Hiển thị loading indicator"
          - api: "hideLoading()"
            description: "Ẩn loading indicator"

        navigation:
          - api: "openShareSheet({ type, data })"
            description: "Mở sheet chia sẻ nội dung"
          - api: "openWebview({ url })"
            description: "Mở webview trong app"

        system:
          - api: "getSystemInfo()"
            description: "Thông tin device, OS, Zalo version"
          - api: "getPhoneNumber()"
            description: "Lấy SĐT user (cần permission)"

