    # ─────────────────────────────────────────────────────────────────────────
    # ZALOPAY INTEGRATION
    # ─────────────────────────────────────────────────────────────────────────
    zalopay_integration:
      description: "ZaloPay payment integration cho Mini App"

      prerequisites:
        accounts:
          - type: "ZaloPay Merchant Account"
            environments:
              sandbox: "Dùng để test với tiền ảo"
              production: "Dùng cho giao dịch thật"
            apply_at: "https://merchant.zalopay.vn"

          - type: "Zalo Mini App Account"
            register_at: "Zalo Mini App Studio"
            note: "Ghi rõ mục đích tích hợp payment để duyệt nhanh"

        credentials:
          - name: "App ID"
            description: "Định danh ứng dụng merchant"
          - name: "Key 1 (App Key / Mac Key)"
            description: "Dùng để tạo chữ ký (signature) cho request"
          - name: "Key 2 (Callback Key)"
            description: "Dùng để verify callback từ ZaloPay"
          - name: "Redirect Path"
            description: "URL redirect sau khi thanh toán"

      sdk_integration:
        cdn_urls:
          sandbox: "https://sbgateway.zalopay.vn/openinapp/zsdk.js"
          staging: "https://stgateway.zalopay.vn/openinapp/zsdk.js"
          production: "https://gateway.zalopay.vn/openinapp/zsdk.js"

        key_functions:
          - function: "window.zlpSdk.UI.setTitle(title)"
            description: "Set tiêu đề trang"
          - function: "window.zlpSdk.Payment.startCashier(params)"
            description: "Mở payment UI"
          - function: "window.zlpSdk.Payment.createBindingAgreementPay(params)"
            description: "Thanh toán với binding"

      api_endpoints:
        sandbox:
          base: "https://sb-openapi.zalopay.vn/v2"
          create: "/create"
          query: "/query"
          refund: "/refund"
        production:
          base: "https://openapi.zalopay.vn/v2"
          create: "/create"
          query: "/query"
          refund: "/refund"

      payment_flow:
        description: "Luồng thanh toán hoàn chỉnh"
        steps:
          - step: 1
            actor: "Frontend"
            action: "User click 'Thanh toán'"
            code: |
              const handleCheckout = async () => {
                const orderData = prepareOrderData();
                const response = await createPaymentOrder(orderData);
                // response.zp_trans_token
              };

          - step: 2
            actor: "Backend"
            action: "Gọi ZaloPay API tạo order"
            code: |
              // Backend (Node.js example)
              const createOrder = async (orderInfo) => {
                const params = {
                  app_id: process.env.ZALOPAY_APP_ID,
                  app_user: orderInfo.userId,
                  app_trans_id: generateTransId(),
                  app_time: Date.now(),
                  amount: orderInfo.amount,
                  item: JSON.stringify(orderInfo.items),
                  description: `Thanh toán đơn hàng #${orderInfo.orderId}`,
                  embed_data: JSON.stringify({ redirecturl: REDIRECT_URL }),
                  callback_url: CALLBACK_URL,
                };
                params.mac = generateMAC(params, KEY1);

                const response = await axios.post(ZALOPAY_CREATE_URL, params);
                return response.data;
              };

          - step: 3
            actor: "Frontend"
            action: "Mở ZaloPay payment UI"
            code: |
              // Trong Mini App
              const openPayment = (zpTransToken: string) => {
                window.zlpSdk.Payment.startCashier({
                  zp_trans_token: zpTransToken,
                  on_success: () => handlePaymentSuccess(),
                  on_fail: (error) => handlePaymentFail(error),
                });
              };

          - step: 4
            actor: "ZaloPay"
            action: "Xử lý thanh toán"
            note: "User nhập mã PIN, xác nhận thanh toán"

          - step: 5
            actor: "Backend"
            action: "Nhận và verify callback"
            code: |
              // Callback handler
              const handleZaloPayCallback = (req, res) => {
                const { data, mac } = req.body;

                // Verify MAC
                const expectedMac = crypto
                  .createHmac('sha256', KEY2)
                  .update(data)
                  .digest('hex');

                if (mac !== expectedMac) {
                  return res.json({ return_code: -1, return_message: 'Invalid MAC' });
                }

                const dataJson = JSON.parse(data);
                // Update order status in database
                await updateOrderStatus(dataJson.app_trans_id, 'PAID');

                return res.json({ return_code: 1, return_message: 'Success' });
              };

          - step: 6
            actor: "Frontend"
            action: "Redirect và hiển thị kết quả"
            code: |
              const handlePaymentSuccess = () => {
                showToast({ message: 'Thanh toán thành công!', type: 'success' });
                navigate('/order-confirmation');
              };

      security_checklist:
        must_do:
          - "App Key, Secret Key chỉ lưu ở Backend"
          - "Verify mọi callback bằng HMAC với Key2"
          - "Implement idempotency cho payment operations"
          - "Log transaction nhưng KHÔNG log sensitive data"
          - "Rate limiting cho payment endpoints"

        never_do:
          - "Hardcode keys trong frontend code"
          - "Trust client-side payment status"
          - "Bỏ qua SSL/TLS"
          - "Update order status trước khi verify callback"

    # ─────────────────────────────────────────────────────────────────────────
    # E-COMMERCE PATTERNS
    # ─────────────────────────────────────────────────────────────────────────
    ecommerce_patterns:
      description: "Best practices cho e-commerce Mini App"

      state_management:
        recommended: "Zustand"
        reason: "Lightweight, simple API, perfect for Mini App"

        cart_store_example: |
          // stores/cart.ts
          import { create } from 'zustand';
          import { persist } from 'zustand/middleware';

          interface CartItem {
            productId: string;
            name: string;
            price: number;
            quantity: number;
            variant?: { size?: string; color?: string };
          }

          interface CartStore {
            items: CartItem[];
            addItem: (item: CartItem) => void;
            removeItem: (productId: string) => void;
            updateQuantity: (productId: string, quantity: number) => void;
            clearCart: () => void;
            total: () => number;
          }

          export const useCartStore = create<CartStore>()(
            persist(
              (set, get) => ({
                items: [],

                addItem: (item) => set((state) => {
                  const existing = state.items.find(i => i.productId === item.productId);
                  if (existing) {
                    return {
                      items: state.items.map(i =>
                        i.productId === item.productId
                          ? { ...i, quantity: i.quantity + item.quantity }
                          : i
                      ),
                    };
                  }
                  return { items: [...state.items, item] };
                }),

                removeItem: (productId) => set((state) => ({
                  items: state.items.filter(i => i.productId !== productId),
                })),

                updateQuantity: (productId, quantity) => set((state) => ({
                  items: state.items.map(i =>
                    i.productId === productId ? { ...i, quantity } : i
                  ),
                })),

                clearCart: () => set({ items: [] }),

                total: () => get().items.reduce(
                  (sum, item) => sum + item.price * item.quantity,
                  0
                ),
              }),
              { name: 'cart-storage' }
            )
          );

      ui_patterns:
        product_card: |
          // components/product/ProductCard.tsx
          import { Box, Text } from 'zmp-ui';

          interface ProductCardProps {
            product: Product;
            onAddToCart: (product: Product) => void;
          }

          export const ProductCard: React.FC<ProductCardProps> = ({ product, onAddToCart }) => {
            return (
              <Box className="product-card" onClick={() => navigate(`/product/${product.id}`)}>
                <img
                  src={product.image}
                  alt={product.name}
                  loading="lazy"
                />
                <Box className="product-info">
                  <Text size="small" className="product-name">{product.name}</Text>
                  <Text size="large" bold className="product-price">
                    {formatPrice(product.price)}đ
                  </Text>
                  <Button
                    size="small"
                    onClick={(e) => {
                      e.stopPropagation();
                      onAddToCart(product);
                    }}
                  >
                    Thêm vào giỏ
                  </Button>
                </Box>
              </Box>
            );
          };

        infinite_scroll: |
          // hooks/useInfiniteProducts.ts
          import { useState, useCallback, useEffect } from 'react';

          export const useInfiniteProducts = (categoryId?: string) => {
            const [products, setProducts] = useState<Product[]>([]);
            const [page, setPage] = useState(1);
            const [hasMore, setHasMore] = useState(true);
            const [loading, setLoading] = useState(false);

            const loadMore = useCallback(async () => {
              if (loading || !hasMore) return;

              setLoading(true);
              try {
                const newProducts = await fetchProducts({ page, categoryId });
                setProducts(prev => [...prev, ...newProducts.data]);
                setHasMore(newProducts.hasMore);
                setPage(p => p + 1);
              } finally {
                setLoading(false);
              }
            }, [page, categoryId, loading, hasMore]);

            useEffect(() => {
              loadMore();
            }, []);

            return { products, loadMore, hasMore, loading };
          };

